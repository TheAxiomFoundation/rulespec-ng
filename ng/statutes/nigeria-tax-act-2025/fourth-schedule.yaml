format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
  summary: |-
    "The income tax payable on the chargeable income of an individual, other than an individual earning the Minimum Wage in line with the minimum wage Act, in respect of each year of assessment, shall be as specified in the Fourth Schedule to this Act" (section 58). Fourth Schedule: "After the relief allowance and exemptions had been granted in accordance with subsection (1) of section 30 of this Act, the taxable income ascertained shall be taxed at the following rates - (a) First N800,000 at 0%; (b) Next N2,200,000 at 15%; (c) Next N9,000,000 at 18%; (d) Next N13,000,000 at 21%; (e) Next N25,000,000 at 23%; and (f) Above N50,000,000 at 25%."
rules:
  - name: first_band_width
    kind: parameter
    dtype: Money
    unit: NGN
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "First N800,000 at 0%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          800000
  - name: first_band_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "First N800,000 at 0%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0
  - name: second_band_width
    kind: parameter
    dtype: Money
    unit: NGN
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Next N2,200,000 at 15%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          2200000
  - name: second_band_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Next N2,200,000 at 15%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.15
  - name: third_band_width
    kind: parameter
    dtype: Money
    unit: NGN
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Next N9,000,000 at 18%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          9000000
  - name: third_band_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Next N9,000,000 at 18%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.18
  - name: fourth_band_width
    kind: parameter
    dtype: Money
    unit: NGN
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Next N13,000,000 at 21%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          13000000
  - name: fourth_band_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Next N13,000,000 at 21%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.21
  - name: fifth_band_width
    kind: parameter
    dtype: Money
    unit: NGN
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Next N25,000,000 at 23%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          25000000
  - name: fifth_band_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Next N25,000,000 at 23%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.23
  - name: top_band_lower_bound
    kind: parameter
    dtype: Money
    unit: NGN
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (f)
    metadata:
      # The five explicit band widths (800,000 + 2,200,000 + 9,000,000 +
      # 13,000,000 + 25,000,000) sum to exactly 50,000,000, the "Above
      # N50,000,000" label of the top band, so the labelled literal and the
      # cumulative boundary coincide.
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Above N50,000,000 at 25%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          50000000
  - name: top_band_rate
    kind: parameter
    dtype: Rate
    period: Year
    source: Nigeria Tax Act 2025, Fourth Schedule, item (f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "Above N50,000,000 at 25%"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.25
  - name: individual_income_tax_payable
    kind: derived
    entity: Person
    dtype: Money
    unit: NGN
    period: Year
    source: Nigeria Tax Act 2025, section 58 and Fourth Schedule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/58
              excerpt: "other than an individual earning the Minimum Wage in line with the minimum wage Act"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: ng/statute/nigeria-tax-act-2025/fourth-schedule
              excerpt: "the taxable income ascertained shall be taxed at the following rates"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if earns_minimum_wage: 0 else: (min(chargeable_income, first_band_width) * first_band_rate) + (min(max(0, chargeable_income - first_band_width), second_band_width) * second_band_rate) + (min(max(0, chargeable_income - first_band_width - second_band_width), third_band_width) * third_band_rate) + (min(max(0, chargeable_income - first_band_width - second_band_width - third_band_width), fourth_band_width) * fourth_band_rate) + (min(max(0, chargeable_income - first_band_width - second_band_width - third_band_width - fourth_band_width), fifth_band_width) * fifth_band_rate) + (max(0, chargeable_income - top_band_lower_bound) * top_band_rate)
