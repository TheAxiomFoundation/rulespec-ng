# Companion fixtures for the Nigeria Tax Act 2025 Fourth Schedule individual
# income-tax rate schedule (charged by section 58). Expected values are
# computed by hand from the verbatim band widths and rates in the cited
# corpus provision, then verified digit-by-digit through the engine.
# Fixture provenance is manual (orchestrator-computed) per the interim
# convention in axiom-encode#1060: the codex/gpt-5.5 backend produces the
# rule; companion fixtures are written and attested independently with
# shown arithmetic.
#
# Fourth Schedule bands (annual, NGN; widths sum exactly to each cumulative
# boundary: 800,000 / 3,000,000 / 12,000,000 / 25,000,000 / 50,000,000):
#   First     N800,000  at  0%
#   Next    N2,200,000  at 15%   -> cumulative upper  3,000,000
#   Next    N9,000,000  at 18%   -> cumulative upper 12,000,000
#   Next   N13,000,000  at 21%   -> cumulative upper 25,000,000
#   Next   N25,000,000  at 23%   -> cumulative upper 50,000,000
#   Above  N50,000,000  at 25%
# Section 58 excepts "an individual earning the Minimum Wage in line with
# the minimum wage Act" from the charge.
# Validation year: 2026, the first year of assessment under the Nigeria Tax
# Act 2025 (assent and gazette 26 June 2025; announced implementation
# 1 January 2026; the Act repeals the Personal Income Tax Act, Cap. P8).

- name: income_of_500000_within_zero_band_pays_no_tax
  # Chargeable income of N500,000 is within the First N800,000 at 0%, so
  # tax is zero.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.chargeable_income: 500000
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.earns_minimum_wage: false
  output:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#individual_income_tax_payable: 0

- name: income_at_800000_boundary_pays_no_tax
  # Boundary case: exactly the top of the 0% band -> tax 0.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.chargeable_income: 800000
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.earns_minimum_wage: false
  output:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#individual_income_tax_payable: 0

- name: income_of_3000000_taxed_through_15_percent_band
  # Band 2 exactly filled: (3,000,000 - 800,000) x 0.15 = 2,200,000 x 0.15
  # = 330,000.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.chargeable_income: 3000000
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.earns_minimum_wage: false
  output:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#individual_income_tax_payable: 330000

- name: income_of_10000000_taxed_through_18_percent_band
  # Band 2: 2,200,000 x 0.15               = 330,000
  # Band 3: (10,000,000 - 3,000,000) x 0.18 = 7,000,000 x 0.18 = 1,260,000
  # Total = 330,000 + 1,260,000 = 1,590,000
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.chargeable_income: 10000000
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.earns_minimum_wage: false
  output:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#individual_income_tax_payable: 1590000

- name: income_of_20000000_taxed_through_21_percent_band
  # Band 2: 2,200,000 x 0.15                 = 330,000
  # Band 3: 9,000,000 x 0.18                 = 1,620,000
  # Band 4: (20,000,000 - 12,000,000) x 0.21 = 8,000,000 x 0.21 = 1,680,000
  # Total = 330,000 + 1,620,000 + 1,680,000 = 3,630,000
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.chargeable_income: 20000000
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.earns_minimum_wage: false
  output:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#individual_income_tax_payable: 3630000

- name: income_of_60000000_taxed_through_top_25_percent_band
  # Band 2: 2,200,000 x 0.15                 = 330,000
  # Band 3: 9,000,000 x 0.18                 = 1,620,000
  # Band 4: 13,000,000 x 0.21                = 2,730,000
  # Band 5: 25,000,000 x 0.23                = 5,750,000
  # Band 6: (60,000,000 - 50,000,000) x 0.25 = 10,000,000 x 0.25 = 2,500,000
  # Total = 330,000 + 1,620,000 + 2,730,000 + 5,750,000 + 2,500,000
  #       = 1,950,000 + 2,730,000 + 5,750,000 + 2,500,000
  #       = 4,680,000 + 5,750,000 + 2,500,000
  #       = 10,430,000 + 2,500,000
  #       = 12,930,000
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.chargeable_income: 60000000
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.earns_minimum_wage: false
  output:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#individual_income_tax_payable: 12930000

- name: minimum_wage_earner_pays_no_tax
  # Section 58 excepts an individual earning the Minimum Wage from the
  # charge, so tax is zero regardless of the schedule.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.chargeable_income: 1000000
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.earns_minimum_wage: true
  output:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#individual_income_tax_payable: 0

- name: pwc_worldwide_tax_summaries_sample_tax_on_22600000
  # External worked example (listing gate 2), continued from the section 30
  # sample: PwC computes tax on taxable income NGN 22,600,000 as
  #   First    800,000 at  0% =         0
  #   Next   2,200,000 at 15% =   330,000
  #   Next   9,000,000 at 18% = 1,620,000
  #   Next (22,600,000 - 12,000,000) = 10,600,000 at 21% = 2,226,000
  #   Total PAYE payable                              = 4,176,000
  # matching this module exactly.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.chargeable_income: 22600000
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#input.earns_minimum_wage: false
  output:
    ng:statutes/nigeria-tax-act-2025/fourth-schedule#individual_income_tax_payable: 4176000
